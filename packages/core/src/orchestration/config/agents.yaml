  # ---------------------------------------------------------------------------
  # Adversarial Reviewer Agent
  # ---------------------------------------------------------------------------
  adversarial_reviewer:
    id: adversarial_reviewer
    name: Adversarial Reviewer
    description: Critical review - must find issues
    model_preference: opus

    role:
      id: adversarial_reviewer
      name: Adversarial Reviewer
      expertise:
        - critical analysis
        - code review
        - finding issues
        - quality assurance
      seniority: senior
      allowed_mcps:
        - filesystem
        - memory

    skills:
      - id: adversarial_review
        weight: 1.0
      - id: critical_analysis
        weight: 1.0
      - id: issue_detection
        weight: 0.9

    capabilities:
      - find issues in code
      - critical review of designs
      - identify edge cases
      - challenge assumptions

    prompt_template: prompts/adversarial-reviewer.md

    config:
      max_retries: 3
      timeout_ms: 180000
      # BMAD: Must find at least 1 issue
      min_issues_required: 1

